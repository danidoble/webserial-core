<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Serial — webserial-core demo</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      :root {
        --accent: #22c55e;
        --accent-dark: #16a34a;
        --accent-badge: #052e16;
        --log-event: #38bdf8;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>⚡ Web Serial</h1>
        <span class="badge">Native API</span>
        <span>webserial-core v2</span>
      </header>

      <div class="controls">
        <button id="btn-connect">Connect</button>
        <button id="btn-disconnect" disabled>Disconnect</button>
      </div>

      <div class="send-row">
        <button id="mode-toggle">TXT</button>
        <input
          id="input-send"
          type="text"
          placeholder="Type a command, e.g. LED_ON"
          disabled
        />
        <button id="btn-send" disabled>Send</button>
      </div>

      <div id="log"></div>

      <a class="nav-link" href="/demos/web-usb/">→ WebUSB Polyfill</a>
      <a class="nav-link" href="/demos/web-bluetooth/"
        >→ Web Bluetooth (BLE UART)</a
      >
      <a class="nav-link" href="/demos/websocket/"
        >→ WebSocket Bridge (Node.js)</a
      >
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
